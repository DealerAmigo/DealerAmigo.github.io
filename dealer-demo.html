<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Éxito Import — Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --red: #C8102E; --dark: #0a0a0a; --mid: #141414; --card: #1c1c1c; --border: #2a2a2a; --border-light: #333; --text: #f0f0f0; --muted: #777; --green: #4caf50; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
header { background: var(--mid); border-bottom: 2px solid var(--red); padding: 13px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.logo-icon { width: 38px; height: 38px; background: var(--red); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: white; }
.logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; }
.logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; display: block; }
.chat-wrap { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
.bubble { display: flex; gap: 9px; align-items: flex-end; max-width: 100%; animation: fadeUp .2s ease; }
.bubble.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.av.bot { background: var(--red); color: white; font-family: 'Bebas Neue'; }
.av.usr { background: var(--border-light); color: var(--muted); }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
.bubble.bot .msg { background: var(--card); border: 1px solid var(--border-light); border-bottom-left-radius: 2px; }
.bubble.user .msg { background: var(--red); color: white; border-bottom-right-radius: 2px; }
.qr-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 39px; }
.qr-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text); padding: 6px 12px; border-radius: 100px; font-size: 12px; cursor: pointer; }
.input-bar { background: var(--mid); border-top: 1px solid var(--border); padding: 12px 16px; }
.input-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; }
input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 10px 16px; color: white; outline: none; }
.send-btn { width: 40px; height: 40px; background: var(--red); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lead-card { background: rgba(76,175,80,0.1); border: 1px solid var(--green); padding: 10px; border-radius: 8px; margin-left: 39px; font-size: 12px; }
.typing { font-size: 12px; color: var(--muted); margin-left: 39px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">AE</div>
  <div><span class="logo-name">Auto Éxito Import</span><span class="logo-sub">Asistente Virtual</span></div>
</header>

<div class="chat-wrap" id="messages"></div>

<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="userInput" placeholder="Pregunta por un auto..." autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// CONFIG
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzylLQyJ_FXOyXOZbKZtMX3tSGfhiaSf4GCIoiXvSrYK74uhoboSR7ZMKketMVkG6xg/exec';
const PROXY_TOKEN = 'secretaria-pr-2026-k8mXpQ';

const SYSTEM_PROMPT = `Eres Éxito, el asistente de Auto Éxito Import en Vega Alta, PR. 
Reglas: Máximo 3 oraciones. Tono de Puerto Rico. Directo.
Tu meta: Conseguir nombre y número para llamar al cliente hoy mismo.
Inventario: Ford Bronco 2022, Jeep Wrangler 2023, Toyota Tacoma 2024, Toyota Corolla 2025.
Si el cliente da nombre y número, usa: CITA_CONFIRMADA:[nombre]|[telefono]|hoy`;

let history = [];
let leadCaptured = false;

async function callClaude(msgs) {
    const response = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
            system: SYSTEM_PROMPT,
            messages: msgs.map(m => ({ role: m.role, content: m.content })),
            _token: PROXY_TOKEN
        })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    return data.content[0].text;
}

function addMessage(role, text, qr = []) {
    const wrap = document.getElementById('messages');
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;
    bubble.innerHTML = `<div class="av ${role === 'user' ? 'usr' : 'bot'}">${role === 'user' ? '👤' : 'AE'}</div>
                        <div class="msg">${text.replace(/\n/g, '<br>')}</div>`;
    wrap.appendChild(bubble);

    if (qr.length) {
        const qrWrap = document.createElement('div');
        qrWrap.className = 'qr-wrap';
        qr.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'qr-btn';
            btn.innerText = q;
            btn.onclick = () => { document.getElementById('userInput').value = q; sendMessage(); qrWrap.remove(); };
            qrWrap.appendChild(btn);
        });
        wrap.appendChild(qrWrap);
    }
    wrap.scrollTop = wrap.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerText = 'Éxito está escribiendo...';
    document.getElementById('messages').appendChild(typing);

    try {
        let reply = await callClaude(history);
        typing.remove();

        const citaMatch = reply.match(/CITA_CONFIRMADA:([^|]+)\|([^|]+)\|(.+)/);
        if (citaMatch && !leadCaptured) {
            leadCaptured = true;
            reply = reply.replace(/CITA_CONFIRMADA:.+/, '').trim();
            const card = document.createElement('div');
            card.className = 'lead-card';
            card.innerHTML = `✅ <b>Cita lista:</b> ${citaMatch[1]} | ${citaMatch[2]}`;
            document.getElementById('messages').appendChild(card);
        }

        history.push({ role: 'assistant', content: reply });
        addMessage('bot', reply, ['¿Qué requisitos piden?', '¿Tienen financiamiento?']);
    } catch (e) {
        typing.remove();
        addMessage('bot', 'Error de conexión. Llama al (787) 530-1101');
    }
}

window.onload = () => {
    addMessage('bot', '¡Hola! Soy Éxito de Auto Éxito Import. ¿Buscas un auto personal o familiar?', ['Personal', 'Familiar', 'Crédito difícil']);
};
</script>
</body>
</html>
