<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Éxito Import — Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #E31230; /* Un rojo más vibrante */
  --bg-dark: #0f1115;
  --bg-card: #1a1d23;
  --bg-input: #242830;
  --border: #2d323d;
  --text-main: #ffffff;
  --text-muted: #94a3b8;
  --accent: #fbbf24;
  --success: #22c55e;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body { 
  background: var(--bg-dark); 
  color: var(--text-main); 
  font-family: 'DM Sans', sans-serif; 
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header Estilizado */
header { 
  background: rgba(15, 17, 21, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border); 
  padding: 16px 24px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}

.logo-block { display: flex; align-items: center; gap: 15px; }

.logo-icon { 
  width: 45px; height: 45px; 
  background: var(--primary); 
  border-radius: 12px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-family: 'Bebas Neue', sans-serif; 
  font-size: 22px; 
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(227, 18, 48, 0.3);
}

.logo-name { 
  font-family: 'Bebas Neue', sans-serif; 
  font-size: 24px; 
  letter-spacing: 1.5px; 
  font-weight: 800; /* Bolder */
  line-height: 1;
}

.logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

/* Contenedor de Chat */
.chat-wrap { 
  flex: 1; 
  overflow-y: auto; 
  padding: 25px; 
  display: flex; 
  flex-direction: column; 
  gap: 20px; 
}

.bubble { display: flex; gap: 12px; animation: slideIn 0.3s ease-out; }
.bubble.user { flex-direction: row-reverse; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.av { 
  width: 36px; height: 36px; border-radius: 10px; 
  display: flex; align-items: center; justify-content: center; 
  font-weight: bold; font-size: 14px;
}

.av.bot { background: var(--primary); }
.av.usr { background: var(--bg-input); border: 1px solid var(--border); }

.msg { 
  max-width: 80%; 
  padding: 14px 18px; 
  border-radius: 18px; 
  font-size: 15px; /* Ligeramente más grande */
  line-height: 1.6;
  font-weight: 500; /* Medium-Bold */
}

.bubble.bot .msg { 
  background: var(--bg-card); 
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.bubble.user .msg { 
  background: var(--primary); 
  color: white; 
  border-top-right-radius: 4px;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(227, 18, 48, 0.2);
}

/* Botones de Respuesta Rápida (Quick Replies) */
.qr-wrap { display: flex; flex-wrap: wrap; gap: 10px; padding-left: 48px; }

.qr-btn { 
  background: var(--bg-input); 
  border: 1px solid var(--border); 
  color: var(--text-main); 
  padding: 10px 18px; 
  border-radius: 12px; 
  font-size: 13px; 
  font-weight: 600;
  cursor: pointer; 
  transition: all 0.2s; 
}

.qr-btn:hover { 
  border-color: var(--primary); 
  background: var(--primary);
  transform: translateY(-2px);
}

/* Barra de Entrada */
.input-bar { 
  background: var(--bg-card); 
  padding: 20px 25px; 
  border-top: 1px solid var(--border);
}

.input-inner { 
  max-width: 800px; 
  margin: 0 auto; 
  display: flex; 
  gap: 12px; 
}

.input-inner input { 
  flex: 1; 
  background: var(--bg-input); 
  border: 2px solid transparent; 
  border-radius: 14px; 
  padding: 14px 20px; 
  color: white; 
  font-size: 15px; 
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
}

.input-inner input:focus { border-color: var(--primary); background: var(--bg-dark); }

.send-btn { 
  width: 50px; height: 50px; 
  background: var(--primary); 
  border-radius: 14px; 
  border: none;
  cursor: pointer; 
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}

.send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

/* Lead Card Estilizada */
.lead-card {
  margin-left: 48px;
  background: linear-gradient(145deg, #1e293b, #0f172a);
  border-left: 4px solid var(--success);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<header>
  <div class="logo-block">
    <div class="logo-icon">AE</div>
    <div class="logo-text">
      <span class="logo-name">Auto Éxito Import</span>
      <span class="logo-sub">Asistente Virtual · Vega Alta, PR</span>
    </div>
  </div>
  <div class="status-pill"><div class="status-dot"></div>En línea 24/7</div>
</header>
<div class="chat-wrap" id="messages"></div>
<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by SecretarIA · autoexitopr.com</div>
</div>
<script>
const PROXY_URL   = 'https://script.google.com/macros/s/AKfycbwRRcnuphYhBuK367dY-Jjn7zttf6DFBitPqYdfGqbeejYbGXQJUEco72OWE_qcFf0z/exec';
const PROXY_TOKEN = 'secretaria-pr-2026-k8mXpQ';
const SESSION_ID  = Math.random().toString(36).substring(2, 12);

let history = [];
let leadCaptured = false;

async function callClaude(messages) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      model:      'claude-haiku-4-5-20251001',
      max_tokens: 500,
      messages:   messages,
      _token:     PROXY_TOKEN,
      _session:   SESSION_ID,
      _cliente:   'Auto Éxito Import'
    })
  });
  if (!res.ok) throw new Error('Proxy ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.content[0].text;
}

function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function addMessage(role, html, qr = []) {
  const wrap = document.getElementById('messages');
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'usr' : 'bot');
  av.textContent = role === 'user' ? '👤' : 'AE';
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.innerHTML = html.replace(/\n/g, '<br>');
  bubble.appendChild(av); bubble.appendChild(msg); wrap.appendChild(bubble);
  if (qr.length) {
    const qrWrap = document.createElement('div');
    qrWrap.className = 'qr-wrap';
    qr.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn'; btn.textContent = text;
      btn.onclick = () => { qrWrap.remove(); document.getElementById('userInput').value = text; sendMessage(); };
      qrWrap.appendChild(btn);
    });
    wrap.appendChild(qrWrap);
  }
  scrollBottom();
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const t = document.createElement('div');
  t.className = 'bubble bot'; t.id = 'typing';
  t.innerHTML = `<div class="av bot">AE</div><div class="msg"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(t); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function showLeadCard(nombre, telefono, presupuesto, vehiculo, notas) {
  const wrap = document.getElementById('messages');
  const card = document.createElement('div');
  const esNQ = notas && notas.toLowerCase().includes('no cualificado');
  card.className = 'lead-card' + (esNQ ? ' nq' : '');
  card.innerHTML = `
    <strong>${esNQ ? '📋 Contacto guardado' : '✅ Lead calificado — equipo notificado'}</strong>
    👤 ${nombre} &nbsp;|&nbsp; 📞 ${telefono}<br>
    🚗 ${vehiculo || 'Por definir'}<br>
    💰 ${presupuesto || 'A consultar'}<br>
    📋 ${notas || ''}
    <br><span class="badge">${esNQ ? '📅 Seguimiento futuro' : '📧 Wilnelis notificada'}</span>
  `;
  wrap.appendChild(card); scrollBottom();
}

function getQuickReplies(reply, turn) {
  const r = reply.toLowerCase();
  if (r.includes('tipo de carro') || r.includes('qué carro') || r.includes('que carro'))
    return ['SUV familiar', 'Sedán económico', 'Pickup truck', 'Lo que haya económico'];
  if (r.includes('llama la atención') || r.includes('interesa') || r.includes('siguiente'))
    return ['Me gusta el primero', 'Me gusta el segundo', 'Me gusta el tercero', 'Ver otros'];
  if (r.includes('gusto') || r.includes('nombre'))
    return [];
  if (r.includes('trade') || r.includes('cambio') || r.includes('vehículo para'))
    return ['Sí tengo para cambio', 'No tengo trade-in'];
  if (r.includes('financia') || r.includes('efectivo') || r.includes('préstamo'))
    return ['Necesito financiamiento', 'Pago en efectivo'];
  if (r.includes('permiso') || r.includes('whatsapp') || r.includes('fotos'))
    return ['Sí, me puedes contactar', 'Prefiero solo aquí'];
  if (r.includes('test drive') || r.includes('visitar') || r.includes('venir'))
    return ['Sí quiero ir', 'Esta semana', 'Prefiero llamada'];
  if (r.includes('montas') || r.includes('cuadran') || r.includes('número'))
    return ['Sí, me monto', 'Necesito pensarlo', 'Dame más info'];
  if (r.includes('pago') || r.includes('mensual'))
    return ['Menos de $400/mes', 'Entre $400-$600/mes', 'Más de $600/mes'];
  return [];
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    let reply = await callClaude(history);

    const leadMatch = reply.match(/CITA_CONFIRMADA:([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|(.+)/);
    if (leadMatch && !leadCaptured) {
      leadCaptured = true;
      reply = reply.replace(/CITA_CONFIRMADA:.+/, '').trim();
      showLeadCard(leadMatch[1].trim(), leadMatch[2].trim(), leadMatch[3].trim(), leadMatch[4].trim(), leadMatch[5].trim());
    }

    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMessage('bot', reply, getQuickReplies(reply, history.length));

  } catch (err) {
    removeTyping();
    addMessage('bot', 'Tuve un problema de conexión. Llámanos al (787) 331-0450 📞');
    console.error('Error:', err);
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) sendMessage();
});

window.onload = async () => {
  showTyping();
  await new Promise(r => setTimeout(r, 900));
  removeTyping();
  const greeting = `¡Bienvenido a Auto Éxito Import! 🚗\n\n¿Qué tipo de carro estás buscando?`;
  history.push({ role: 'assistant', content: greeting });
  addMessage('bot', greeting, ['SUV familiar', 'Sedán económico', 'Pickup truck', 'Lo que haya económico']);
};
</script>
</body>
</html>
