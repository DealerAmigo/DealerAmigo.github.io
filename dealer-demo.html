<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Éxito Import — Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ... (Tus estilos originales aquí, se mantienen intactos) ... */
:root { --red: #C8102E; --dark: #0a0a0a; --mid: #141414; --card: #1c1c1c; --border: #2a2a2a; --border-light: #333; --text: #f0f0f0; --muted: #777; --accent: #FFD700; --green: #4caf50; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
header { background: var(--mid); border-bottom: 2px solid var(--red); padding: 13px 20px; display: flex; align-items: center; gap: 14px; position: relative; }
.logo-block { display: flex; align-items: center; gap: 11px; }
.logo-icon { width: 38px; height: 38px; background: var(--red); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: white; }
.logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; line-height: 1; }
.logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; }
.status-pill { margin-left: auto; display: flex; align-items: center; gap: 6px; background: rgba(76,175,80,.08); border: 1px solid rgba(76,175,80,.25); border-radius: 100px; padding: 4px 12px; font-size: 11px; color: var(--green); }
.status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.chat-wrap { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
.bubble { display: flex; gap: 9px; align-items: flex-end; animation: fadeUp .28s ease; max-width: 100%; }
.bubble.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.av.bot { background: var(--red); color: white; font-family: 'Bebas Neue', sans-serif; }
.av.usr { background: var(--border-light); color: var(--muted); }
.msg { max-width: 73%; padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.58; }
.bubble.bot .msg { background: var(--card); border: 1px solid var(--border-light); border-bottom-left-radius: 4px; }
.bubble.user .msg { background: var(--red); color: white; border-bottom-right-radius: 4px; }
.typing-dots { display: flex; gap: 4px; padding: 13px 15px; }
.typing-dots span { width: 7px; height: 7px; background: var(--border-light); border-radius: 50%; animation: bounce 1.2s infinite; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.qr-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding: 4px 0 8px 39px; }
.qr-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text); padding: 7px 14px; border-radius: 100px; font-size: 13px; cursor: pointer; transition: all .18s; }
.qr-btn:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,.06); }
.lead-card { background: rgba(76,175,80,.08); border: 1px solid rgba(76,175,80,.3); border-radius: 10px; padding: 13px 16px; font-size: 13px; margin: 2px 0 6px 39px; }
.lead-card strong { display: block; margin-bottom: 5px; color: var(--green); font-size: 11px; text-transform: uppercase; }
.input-bar { background: var(--mid); border-top: 1px solid var(--border); padding: 12px 16px; }
.input-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 9px; }
.input-inner input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 11px 18px; color: var(--text); outline: none; }
.send-btn { width: 42px; height: 42px; background: var(--red); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
.send-btn:hover { transform: scale(1.1); }
.send-btn svg { width: 17px; fill: white; }
.powered { text-align: center; font-size: 10px; color: #2a2a2a; margin-top: 7px; }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-icon">AE</div>
    <div class="logo-text">
      <span class="logo-name">Auto Éxito Import</span>
      <span class="logo-sub">Asistente Virtual · Vega Alta, PR</span>
    </div>
  </div>
  <div class="status-pill"><div class="status-dot"></div>En línea 24/7</div>
</header>

<div class="chat-wrap" id="messages"></div>

<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// CONFIG
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxD4iTFJUPfnDC8a3syfkxx41havvfPWyhvuE36bQOqPp8p4irE7YBv_4q9YCN1bWk/exec';
const PROXY_TOKEN = 'secretaria-pr-2026-k8mXpQ';

// SYSTEM PROMPT (Tu original completo)
const SYSTEM_PROMPT = `Eres Éxito, el asistente virtual de Auto Éxito Import — un dealer de autos en Vega Alta, Puerto Rico. No eres un chatbot genérico... (ETC, aquí pon todo tu prompt largo)`;

let history = [];
let leadCaptured = false;

// LA FUNCIÓN CORREGIDA
async function callClaude(messages) {
  const response = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
    body: JSON.stringify({
      system: SYSTEM_PROMPT,
      messages: messages.map(m => ({ role: m.role, content: m.content })),
      _token: PROXY_TOKEN
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  return data.content[0].text;
}

// ... (Resto de funciones: addMessage, sendMessage, etc., usa las del último mensaje)
</script>
</body>
</html>
