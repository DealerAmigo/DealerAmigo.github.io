<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Éxito Import — Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E; --dark: #0a0a0a; --mid: #141414; --card: #1c1c1c;
  --border: #2a2a2a; --border-light: #333; --text: #f0f0f0;
  --muted: #777; --accent: #FFD700; --green: #4caf50;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
header { background: var(--mid); border-bottom: 2px solid var(--red); padding: 13px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; position: relative; }
header::after { content: ''; position: absolute; bottom: -6px; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--red), transparent); opacity: .4; }
.logo-block { display: flex; align-items: center; gap: 11px; }
.logo-icon { width: 38px; height: 38px; background: var(--red); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: white; letter-spacing: 1px; flex-shrink: 0; }
.logo-text { display: flex; flex-direction: column; }
.logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; color: var(--text); line-height: 1; }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.status-pill { margin-left: auto; display: flex; align-items: center; gap: 6px; background: rgba(76,175,80,.08); border: 1px solid rgba(76,175,80,.25); border-radius: 100px; padding: 4px 12px; font-size: 11px; color: var(--green); font-weight: 500; }
.status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.chat-wrap { flex: 1; overflow-y: auto; padding: 20px 16px 24px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
.chat-wrap::-webkit-scrollbar { width: 3px; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
.bubble { display: flex; gap: 9px; align-items: flex-end; animation: fadeUp .28s ease; max-width: 100%; }
.bubble.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.av.bot { background: var(--red); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 1px; }
.av.usr { background: var(--border-light); color: var(--muted); font-size: 15px; }
.msg { max-width: 73%; padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.58; }
.bubble.bot .msg { background: var(--card); border: 1px solid var(--border-light); border-bottom-left-radius: 4px; color: var(--text); }
.bubble.user .msg { background: var(--red); color: white; border-bottom-right-radius: 4px; }
.typing-dots { display: flex; gap: 4px; padding: 13px 15px; }
.typing-dots span { width: 7px; height: 7px; background: var(--border-light); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.qr-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding: 4px 0 8px 39px; animation: fadeUp .28s ease; }
.qr-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text); padding: 7px 14px; border-radius: 100px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s; }
.qr-btn:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,.06); }

/* ── VEHICLE CARD — solo foto ── */
.vehicle-card {
  margin: 2px 0 6px 39px;
  border-radius: 12px;
  overflow: hidden;
  animation: fadeUp .3s ease;
  max-width: 220px;
  background: var(--border);
}
.vehicle-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* ── LEAD CARD ── */
.lead-card { background: rgba(76,175,80,.08); border: 1px solid rgba(76,175,80,.3); border-radius: 10px; padding: 13px 16px; font-size: 13px; color: var(--text); animation: fadeUp .3s ease; margin: 2px 0 6px 39px; line-height: 1.8; }
.lead-card strong { display: block; margin-bottom: 5px; color: var(--green); font-size: 12px; letter-spacing: .5px; text-transform: uppercase; }
.badge { display: inline-block; background: var(--accent); color: #000; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; margin-top: 4px; }

.input-bar { background: var(--mid); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.input-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 9px; align-items: center; }
.input-inner input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 11px 18px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
.input-inner input:focus { border-color: var(--red); }
.input-inner input::placeholder { color: #444; }
.send-btn { width: 42px; height: 42px; background: var(--red); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .15s; flex-shrink: 0; }
.send-btn:hover { transform: scale(1.07); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
.send-btn svg { width: 17px; height: 17px; fill: white; }
.powered { text-align: center; font-size: 10px; color: #2a2a2a; margin-top: 7px; letter-spacing: .5px; }
</style>
</head>
<body>
<header>
  <div class="logo-block">
    <div class="logo-icon">AE</div>
    <div class="logo-text">
      <span class="logo-name">Auto Éxito Import</span>
      <span class="logo-sub">Asistente Virtual · Vega Alta, PR</span>
    </div>
  </div>
  <div class="status-pill"><div class="status-dot"></div>En línea 24/7</div>
</header>
<div class="chat-wrap" id="messages"></div>
<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by SecretarIA · autoexitopr.com</div>
</div>
<script>
const PROXY_URL   = 'https://script.google.com/macros/s/AKfycbwOeDCCSv3ZL_8v0NpdxC47cBWpZrIOhYAd1s1S3D1ma5myq1Isx3TcA9cfyf70FtbF/exec';
const PROXY_TOKEN = 'secretaria-pr-2026-k8mXpQ';
const SESSION_ID  = Math.random().toString(36).substring(2, 12);

let history = [];
let leadCaptured = false;

async function callClaude(messages) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      model:      'claude-haiku-4-5-20251001',
      max_tokens: 450,
      messages:   messages,
      _token:     PROXY_TOKEN,
      _session:   SESSION_ID,
      _cliente:   'Auto Éxito Import'
    })
  });
  if (!res.ok) throw new Error('Proxy ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function addMessage(role, html, qr = []) {
  const wrap = document.getElementById('messages');
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'usr' : 'bot');
  av.textContent = role === 'user' ? '👤' : 'AE';
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.innerHTML = html.replace(/\n/g, '<br>');
  bubble.appendChild(av); bubble.appendChild(msg); wrap.appendChild(bubble);
  if (qr.length) {
    const qrWrap = document.createElement('div');
    qrWrap.className = 'qr-wrap';
    qr.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn'; btn.textContent = text;
      btn.onclick = () => { qrWrap.remove(); document.getElementById('userInput').value = text; sendMessage(); };
      qrWrap.appendChild(btn);
    });
    wrap.appendChild(qrWrap);
  }
  scrollBottom();
}

function showVehicleCard(card) {
  if (!card) return;
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'vehicle-card';
  div.innerHTML = `<img src="${card.foto}" alt="${card.nombre}" onerror="this.parentElement.style.display='none'">`;
  wrap.appendChild(div);
  scrollBottom();
}

function showLeadCard(nombre, telefono, presupuesto, vehiculo) {
  const wrap = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'lead-card';
  card.innerHTML = `
    <strong>✅ Lead capturado — equipo notificado</strong>
    👤 ${nombre} &nbsp;|&nbsp; 📞 ${telefono}<br>
    🚗 ${vehiculo || 'Por definir'}<br>
    💰 ${presupuesto || 'A consultar'}
    <br><span class="badge">📧 Wilnelis notificada</span>
  `;
  wrap.appendChild(card); scrollBottom();
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const t = document.createElement('div');
  t.className = 'bubble bot'; t.id = 'typing';
  t.innerHTML = `<div class="av bot">AE</div><div class="msg"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(t); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function getQuickReplies(reply, turn) {
  const r = reply.toLowerCase();
  if (turn <= 1) return ['Es para mí solo', 'Es para la familia', 'Tengo crédito difícil', 'Lo necesito ya'];
  if (r.includes('pago') || r.includes('mensual')) return ['Menos de $400/mes', 'Entre $400-$600/mes', 'Más de $600/mes'];
  if (r.includes('montas') || r.includes('cuadran')) return ['Sí, me monto', 'Necesito pensarlo', 'Dame más info'];
  if (r.includes('nombre') || r.includes('número') || r.includes('llamar')) return ['Sí, llámenme hoy', 'Prefiero WhatsApp'];
  if (r.includes('crédito') || r.includes('financi')) return ['Necesito financiamiento', 'Pago en efectivo', '¿Califico?'];
  return [];
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const data = await callClaude(history);
    let reply  = data.content[0].text;
    const card = data._card || null;

    // Detectar lead
    const leadMatch = reply.match(/CITA_CONFIRMADA:([^|]+)\|([^|]+)\|([^|]+)\|(.+)/);
    if (leadMatch && !leadCaptured) {
      leadCaptured = true;
      reply = reply.replace(/CITA_CONFIRMADA:.+/, '').trim();
      showLeadCard(leadMatch[1].trim(), leadMatch[2].trim(), leadMatch[3].trim(), leadMatch[4].trim());
    }

    // Limpiar tags internos del texto
    reply = reply.replace(/VEHICULO_CARD:\w+/g, '').trim();

    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMessage('bot', reply, getQuickReplies(reply, history.length));

    // Mostrar tarjeta del vehículo
    if (card) showVehicleCard(card);

  } catch (err) {
    removeTyping();
    addMessage('bot', 'Tuve un problema de conexión. Llámanos al (787) 331-0450 📞');
    console.error('Error:', err);
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) sendMessage();
});

window.onload = async () => {
  showTyping();
  await new Promise(r => setTimeout(r, 1100));
  removeTyping();
  const greeting = `¡Bienvenido a Auto Éxito Import! 🚗 Soy Éxito, tu asesor.\nEntregamos gratis a toda la isla — incluso el mismo día si los números cuadran hoy.\n\n¿Estás buscando para ti solo o para la familia?`;
  history.push({ role: 'assistant', content: greeting });
  addMessage('bot', greeting, ['Es para mí solo', 'Es para la familia', 'Tengo crédito difícil', 'Lo necesito ya']);
};
</script>
</body>
</html>
